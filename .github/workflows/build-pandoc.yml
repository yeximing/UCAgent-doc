name: build-pandoc-pdf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用公共 pandoc+LaTeX 基础镜像；后续步骤中补充中文与 crossref 依赖
    container:
      image: docker.io/pandoc/extra:3.6.4-ubuntu
    steps:
      - name: Install git, LaTeX extras, fonts
        run: |
          set -eux
          apt-get update
          # 基础工具与字体（Noto CJK 字体满足中文主字体需求）
          apt-get install -y --no-install-recommends \
            fonts-noto-cjk wget xz-utils make git ca-certificates

          # 优先使用 tlmgr 安装 ctex（保证 ctexart.cls 可用，与镜像自带 TeX Live 一致）
          if command -v tlmgr >/dev/null 2>&1; then
            tlmgr option repository http://mirror.ctan.org/systems/texlive/tlnet
            tlmgr update --self
            tlmgr install ctex
            # Pandoc 常用代码环境依赖，缺少会触发 fvextra.sty 等错误
            tlmgr install fvextra fancyvrb upquote xstring etoolbox zref lineno
          else
            # 兜底方案（不推荐）：通过 apt 安装中文支持
            apt-get install -y --no-install-recommends texlive-lang-chinese
          fi

          fc-cache -fv || true
          pandoc --version
          # pandoc/extra 自带 pandoc-crossref，版本与 pandoc 匹配
          pandoc-crossref --version
          fc-list | grep -i "Noto" | head -n 5 || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Build PDF (oneside)
        env:
          HOME: /root
          PDF_ENGINE: tectonic
        run: |
          git config --global --add safe.directory $(pwd)
          make pdf-one

      - name: Build TeX source (debug)
        env:
          HOME: /root
          PDF_ENGINE: tectonic
        run: |
          git config --global --add safe.directory $(pwd)
          pandoc docs/content/00_index.md \
                 docs/content/01_introduce.md \
                 docs/content/02_usage/00_mcp.md \
                 docs/content/02_usage/01_direct.md \
                 docs/content/02_usage/02_assit.md \
                 docs/content/02_usage/03_option.md \
                 docs/content/02_usage/04_tui.md \
                 docs/content/02_usage/05_faq.md \
                 docs/content/03_workflow.md \
                 docs/content/04_customize.md \
                 docs/content/05_tool_list.md \
                 --from=markdown+table_captions+grid_tables+header_attributes+pipe_tables \
                 --table-of-contents \
                 --toc-depth=3 \
                 --number-sections \
                 --metadata=title:"UCAgent 开发者手册" \
                 --metadata=subtitle:"9d0cd00" \
                 --resource-path=.:docs:docs/content:docs/content/02_usage \
                 --highlight-style=tango \
                 --filter pandoc-crossref \
                 --lua-filter=docs/pandoc/auto_colwidth.lua \
                 --pdf-engine=tectonic \
                 -V documentclass=ctexart \
                 -V geometry:margin=2.2cm \
                 -V mainfont="Noto Serif CJK SC" \
                 -V monofont="DejaVu Sans Mono" \
                 -V fontsize=11pt \
                 -H docs/pandoc/header.tex \
                 -V fig-pos=H \
                 -o ucagent-doc.tex

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ucagent-doc
          path: |
            ucagent-doc.pdf
            ucagent-doc.tex

